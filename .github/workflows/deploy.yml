on:
  push:
    branches: [ devops ]
  pull_request:
    branches: [ devops ]

env: 
  AWS_REGION : "us-west-2"
  
permissions:
      id-token: write
      contents: read
jobs:
  Deploy-fio-relic:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::916790350352:role/GitHubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
      - name: Fetch secret from AWS Parameter Store
        run: |
          SECRET_VALUE=$(aws ssm get-parameter --name "/ECS-CLUSTER/beta/SQL_HOST" --with-decryption --query "Parameter.Value" --output text)
          echo "SECRET_VALUE=${SECRET_VALUE}" >> $GITHUB_ENV
      - name: Use the secret
        run: echo "Secret value is $SECRET_VALUE"
