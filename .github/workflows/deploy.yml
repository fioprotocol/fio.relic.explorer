on:
  push:
    branches: [ devops ]
  pull_request:
    branches: [ devops ]

env: 
  AWS_REGION : "us-west-2"
  
permissions:
      id-token: write
      contents: read
jobs:
  Deploy-fio-relic:
    runs-on: ubuntu-latest
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v3
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v1.7.0
        with:
          role-to-assume: arn:aws:iam::916790350352:role/GitHubAction-AssumeRoleWithAction
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}
      - name: Sts GetCallerIdentity
        run: |
          aws sts get-caller-identity
      - name: Fetch secret from AWS Parameter Store
        run: |
          SECRET_VALUE=$(aws ssm get-parameter --name "/ECS-CLUSTER/beta/SQL_HOST" --with-decryption --query "Parameter.Value" --output text)
          echo "SECRET_VALUE=${SECRET_VALUE}" >> $GITHUB_ENV
      - name: AWS SSM Parameter Store
        run: |
          export $(aws ssm get-parameters \
            --names /fio-relic/dev/CLIENT_URL /fio-relic/dev/DB_HOST /fio-relic/dev/DB_NAME /fio-relic/dev/DB_PASSWORD \
              /fio-relic/dev/DB_PORT /fio-relic/dev/DB_SSL /fio-relic/dev/DB_USER /fio-relic/dev/HOST /fio-relic/dev/NODE_ENV \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | awk '{sub(".*/", "", $1); print $1 "=" $2}')
          export $(aws ssm get-parameters \
            --names /fio-relic/dev/PORT /fio-relic/dev/ssh_key \
            --with-decryption \
            --query "Parameters[*].[Name,Value]" \
            --output text | awk '{sub(".*/", "", $1); print $1 "=" $2}')
      - name: Use the secret
        run: echo "Secret value is $DB_HOST"
